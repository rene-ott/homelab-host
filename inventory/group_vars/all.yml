---
# Global bootstrap/access variables — apply to every host (and the bootstrap inventory).
# Operational, per-environment vars live in group_vars/homelab/vars.yml, not here.
# Per-host secret key paths (ansible_admin_key_path, flux_auth_bootstrap_ssh_key_file,
# flux_bootstrap_sops_age_key_file) live in inventory/host_vars/<hostname>.yml instead of here —
# the ~/.homelab/local/<hostname>/... layout (scripts/lib/paths.sh) is per-host, not fleet-wide.

ansible_admin_user: ansible
ansible_admin_sudo_group: sudo
