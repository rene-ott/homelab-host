---
# Global bootstrap/access variables — apply to every host (and the bootstrap inventory).
# Operational, per-environment vars live in group_vars/homelab/vars.yml, not here.

homelab_local_ssh_key_dir: "~/.homelab-secrets/ssh"

bootstrap_user_name: ansible
bootstrap_user_key_file: "{{ homelab_local_ssh_key_dir }}/ansible"
bootstrap_user_sudo_group: sudo
