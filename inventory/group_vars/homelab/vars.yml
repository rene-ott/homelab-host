---
# Non-secret operational variables for the `homelab` group — consumed by site.yml roles.
# Secrets are NOT here (see secrets.sops.yml.example); they remain as workstation files and
# SOPS-encrypted manifests in the homelab-cluster repo.

# --- connection (shared by every homelab host; bootstrap.yml hosts are outside this group and
#     connect as the install-time admin via -u/--ask-pass instead) ---
# Privilege escalation is set at play level (become: true in site.yml/verify.yml), not here.
ansible_user: "{{ bootstrap_user_name }}"
ansible_ssh_private_key_file: "{{ bootstrap_user_key_file }}"

# --- base OS / apt ---
ssh_port: 22
apt_cache_valid_time: 3600

# --- firewall (role: firewall) ---
firewall_allowed_tcp_ports:
  - "{{ ssh_port }}"  # SSH (sourced from ssh_port so the open port can't desync)
  - 9090  # Cockpit
  - 6443  # K3s API
  - 80    # HTTP ingress (Traefik)
  - 443   # HTTPS ingress (Traefik)
  - 445   # Samba/SMB (media + misc shares, guest read-write)
firewall_allowed_udp_ports:
  - "{{ wireguard_listen_port }}"  # WireGuard remote-access VPN

# --- WireGuard remote-access VPN (role: wireguard) ---
wireguard_listen_port: 51820
wireguard_address: "10.10.10.1/24"   # server overlay address; subnet 10.10.10.0/24
                                       # (deliberately outside typical home-LAN 192.168.x.x ranges)

# Peer public keys are not secret but are placeholders until generated. Run
# ./scripts/wireguard-client.sh on the workstation for each device, then paste the printed
# public key below (private keys never leave ~/.homelab-secrets/wireguard/ on the workstation).
# A peer with public_key: "" is skipped by the role (with a warning) until filled in.
wireguard_peers:
  - name: workstation      # Windows 11 host, native WireGuard app (also covers WSL2 traffic —
                            # WSL2 NATs through the Windows host network stack)
    public_key: "Zpr3cag0BRjqdhQpXt4vDtS3pXdfCdqVkNCMP3CANFg="
    allowed_ips: "10.10.10.2/32"
  - name: phone            # GrapheneOS, official WireGuard Android app (QR import)
    public_key: "2RVszTqznYwKs1poCf5yLw4W3m/fz4EbuZylAF19YzE="
    allowed_ips: "10.10.10.3/32"

# --- Storage (role: storage) ---
# Generic, app-agnostic directory roots shared by all K3s apps (Jellyfin, Sonarr, Radarr, ...).
# Apps self-provision their own subdirectories via hostPath DirectoryOrCreate in homelab-cluster.
storage_root_dirs:
  - /srv/media
  - /srv/media/movies
  - /srv/media/tv
  - /srv/media/music
  - /srv/config
  - /srv/cache
  - /srv/misc

# --- K3s platform (role: k3s) ---
# Version pinned here so it is visible in one place alongside the other env-specific vars.
k3s_version: "v1.31.4+k3s1"

# --- Flux bootstrap (role: flux) ---
# The cluster path is per-environment and lives in group_vars/prod.yml and group_vars/staging.yml
# (deliberately no homelab-wide default, so a host in neither group fails fast rather than silently
# bootstrapping the prod path). Repo, deploy key, and age key are shared across environments.
flux_version: "2.4.0"
flux_repo_url: ssh://git@github.com/rene-ott/homelab-cluster
flux_deploy_key_file: "{{ homelab_local_ssh_key_dir }}/flux-deploy"
flux_sops_age_key_file: "{{ '~/.homelab-secrets/age/homelab.agekey' | expanduser }}"
