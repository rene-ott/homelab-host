---
# Main inventory. Both servers share the `homelab` group (common OS/K3s config); the nested
# `prod` / `staging` child groups carry only the per-environment delta (see group_vars/prod.yml,
# group_vars/staging.yml). Shared connection vars live in group_vars/homelab/vars.yml.
#
# Normal runs target one environment: `--limit prod` / `--limit staging` (or a host name).
all:
  children:
    homelab:
      children:
        prod:
          hosts:
            atlas:          # production   -> clusters/core
        staging:
          hosts:
            atlas-stg:      # staging      -> clusters/core-stg
