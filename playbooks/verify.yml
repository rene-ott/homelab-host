---
# Read-only health verification for the homelab. Changes nothing — a healthy run
# reports failed=0 changed=0; a failure names the unhealthy service.
#   ansible-playbook playbooks/verify.yml            # all services
#   ansible-playbook playbooks/verify.yml --tags cockpit         # one service
#   ansible-playbook playbooks/verify.yml --tags flux_bootstrap  # Flux checks only
# Each role owns its checks in roles/<role>/tasks/verify.yml.
#
# import_role (static) is used so --list-tasks expands the inner checks and tags on
# the import propagate to every imported task (so --tags cockpit / --tags k3s select).
- name: Verify homelab services are healthy
  hosts: homelab
  become: true

  tasks:
    - name: Verify wireguard
      ansible.builtin.import_role:
        name: wireguard
        tasks_from: verify
      tags: [verify, wireguard]

    - name: Verify cockpit
      ansible.builtin.import_role:
        name: cockpit
        tasks_from: verify
      tags: [verify, cockpit]

    - name: Verify samba
      ansible.builtin.import_role:
        name: samba
        tasks_from: verify
      tags: [verify, samba]

    - name: Verify k3s
      ansible.builtin.import_role:
        name: k3s
        tasks_from: verify
      tags: [verify, k3s]

    - name: Verify flux_bootstrap
      ansible.builtin.import_role:
        name: flux_bootstrap
        tasks_from: verify
      tags: [verify, flux_bootstrap]
