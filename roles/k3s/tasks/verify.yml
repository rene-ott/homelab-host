---
# Read-only health checks for the K3s platform. Run via playbooks/verify.yml (--tags k3s).
# Every task asserts via failed_when/rc and never mutates (changed_when: false).
- name: Verify k3s service is active
  ansible.builtin.systemd:
    name: k3s
  register: k3s_service
  changed_when: false
  failed_when: k3s_service.status.ActiveState != 'active'

- name: Verify the node is Ready
  ansible.builtin.command: k3s kubectl get nodes --no-headers
  register: k3s_nodes
  changed_when: false
  failed_when: >
    k3s_nodes.rc != 0
    or 'NotReady' in k3s_nodes.stdout
    or 'Ready' not in k3s_nodes.stdout
