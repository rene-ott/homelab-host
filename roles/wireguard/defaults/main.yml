---
# Per-host toggle — set to false in a host's inventory/host_vars/<hostname>.yml to skip this
# role entirely (see playbooks/site.yml).
wireguard_enabled: true

wireguard_interface: wg0
wireguard_config_file: "/etc/wireguard/{{ wireguard_interface }}.conf"
wireguard_private_key_file: "/etc/wireguard/{{ wireguard_interface }}.key"
wireguard_public_key_file: "/etc/wireguard/{{ wireguard_interface }}.pub"

# Real, environment-specific values (listen port, overlay address, peers) live in
# inventory/group_vars/homelab/vars.yml.
wireguard_peers: []
