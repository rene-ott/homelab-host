---
# Preconditions for tasks/main.yml, imported statically at its top.
#
# Each precondition is gated by the mutation it protects, not run unconditionally: the deploy-key
# checks guard `flux bootstrap`, the age-key check guards the sops-age injection. On a converged
# host every gate is closed, so this file costs two kubectl probes and nothing else — no network
# call to GitHub, no workstation file asserts.
#
# The read-only probes set check_mode: false because ansible.builtin.command does not support
# check mode: under --check it skips without running and registers a fabricated rc: 0. Every gate
# below reads rc, so a plain --check against a never-bootstrapped host would conclude "flux-system
# exists, sops-age exists" and report nothing to do. These probes only read, so running them for
# real under --check is safe and makes the dry run honest.

# Guard: catches an inconsistent host_vars combination when this role is run in isolation via
# --tags flux (playbooks/site.yml's own pre_tasks assert only covers a full-playbook run).
- name: Assert k3s is enabled when flux is enabled
  ansible.builtin.assert:
    that: k3s_enabled | default(true) | bool
    fail_msg: "flux requires K3s — set k3s_enabled: true or disable flux_enabled too."

- name: Check if flux-system namespace exists
  ansible.builtin.command:
    cmd: k3s kubectl get namespace flux-system
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: flux_ns_check
  failed_when: false
  changed_when: false
  check_mode: false

# rc != 0 when the namespace itself is absent, which reads correctly as "secret missing".
- name: Check if sops-age secret exists
  ansible.builtin.command:
    cmd: k3s kubectl get secret sops-age -n flux-system
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: flux_sops_secret_check
  failed_when: false
  changed_when: false
  check_mode: false

# Guard: key must exist (generated by scripts/init-workstation.sh) before it is staged on the
# server for `flux bootstrap`.
- name: Assert flux-deploy key exists on workstation
  ansible.builtin.assert:
    that: (flux_deploy_key_file | expanduser) is file
    fail_msg: |
      Flux deploy key not found: {{ flux_deploy_key_file | expanduser }}

      Generate it by running:
        ./scripts/init-workstation.sh
  delegate_to: localhost
  become: false
  when: flux_ns_check.rc != 0

# Validate before mutating: a missing age key must abort the role before the flux CLI
# download/install changes the host.
- name: Assert SOPS age key exists on workstation
  ansible.builtin.assert:
    that: flux_sops_age_key_file is file
    fail_msg: |
      Missing SOPS age key:

        {{ flux_sops_age_key_file }}

      Generate it by running:
        ./scripts/init-workstation.sh
  delegate_to: localhost
  become: false
  when: flux_sops_secret_check.rc != 0

# Reachability is checked per host (no run_once): run_once would evaluate the `when:` below
# against the first host in the play only, so a no-limit run with atlas already bootstrapped
# would skip this gate for atlas-stg and bootstrap it with an unverified key.
- name: Check whether Flux deploy key can reach the repository # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: git ls-remote {{ flux_repo_url }}
  environment:
    GIT_SSH_COMMAND: "ssh -i {{ flux_deploy_key_file | expanduser | quote }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
  register: flux_repo_check
  failed_when: false
  changed_when: false
  check_mode: false
  delegate_to: localhost
  become: false
  when: flux_ns_check.rc != 0

# Fail fast rather than prompting: site.yml must stay non-interactive so it runs under --check
# and unattended. scripts/init-workstation.sh prints the same key and URL when it generates them.
- name: Assert Flux deploy key can reach the repository
  ansible.builtin.assert:
    that: flux_repo_check.rc == 0
    fail_msg: |
      The Flux deploy key cannot reach {{ flux_repo_url }}.

      Add this public key as a deploy key at
        https://github.com/rene-ott/homelab-cluster/settings/keys

      Enable "Allow write access" — Flux pushes the gotk-* manifests during the first bootstrap.

      {{ lookup('file', (flux_deploy_key_file | expanduser) ~ '.pub') }}
  delegate_to: localhost
  become: false
  when: flux_ns_check.rc != 0
