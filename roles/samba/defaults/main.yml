---
samba_shares:
  - name: media
    path: /srv/media
    comment: "Homelab media share (guest, read-write)"
  - name: misc
    path: /srv/misc
    comment: "Homelab misc share (guest, read-write)"

samba_workgroup: WORKGROUP
samba_server_string: "%h media server"

# Must match storage_owner/storage_group in roles/storage/defaults/main.yml (1000:1000).
# Kept numeric here; tasks/main.yml resolves them to names via getent, since smb.conf's
# force user/force group require a resolvable account name, not a raw UID/GID.
samba_force_user: 1000
samba_force_group: 1000

samba_create_mask: "0664"
samba_directory_mask: "0775"
samba_min_protocol: SMB2_10
