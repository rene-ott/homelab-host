---
# Per-host toggle — set to false in a host's inventory/host_vars/<hostname>.yml to skip this
# role entirely (see playbooks/site.yml). Requires storage_enabled: true (see
# roles/storage/defaults/main.yml) — samba shares depend on directories storage creates.
samba_enabled: true

samba_shares:
  - name: media
    path: /srv/media
    comment: "Homelab media share (guest, read-write)"
  - name: misc
    path: /srv/misc
    comment: "Homelab misc share (guest, read-write)"

samba_workgroup: WORKGROUP
samba_server_string: "%h media server"

# Inherited from storage_owner/storage_group (roles/storage/defaults/main.yml) so share
# ownership can never drift from the directories storage creates — samba already requires
# storage_enabled. Numeric by design (hence _uid/_gid); tasks/main.yml resolves them to names
# via getent, since smb.conf's force user/force group require a resolvable account name, not
# a raw UID/GID.
samba_force_uid: "{{ storage_owner }}"
samba_force_gid: "{{ storage_group }}"

samba_create_mask: "0664"
samba_directory_mask: "0775"
samba_min_protocol: SMB2_10
