---
# Guard: catches an inconsistent host_vars combination when this role is run in isolation via
# --tags samba (playbooks/site.yml's own pre_tasks assert only covers a full-playbook run).
- name: Assert storage is enabled when samba is enabled
  ansible.builtin.assert:
    that: storage_enabled | default(true) | bool
    fail_msg: >-
      samba requires storage — set storage_enabled: true or disable samba_enabled too.

- name: Install samba
  ansible.builtin.apt:
    name:
      - samba
      - samba-common-bin
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Resolve force user/group UIDs to names
  ansible.builtin.getent:
    database: "{{ item.db }}"
    key: "{{ item.id }}"
  loop:
    - { db: passwd, id: "{{ samba_force_user }}" }
    - { db: group, id: "{{ samba_force_group }}" }
  loop_control:
    label: "{{ item.db }} {{ item.id }}"

- name: Set force user/group name facts
  ansible.builtin.set_fact:
    samba_force_user_name: "{{ ansible_facts.getent_passwd.keys() | first }}"
    samba_force_group_name: "{{ ansible_facts.getent_group.keys() | first }}"

- name: Deploy smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart smbd

- name: Enable and start smbd
  ansible.builtin.service:
    name: smbd
    state: started
    enabled: true

- name: Disable and stop nmbd
  ansible.builtin.service:
    name: nmbd
    state: stopped
    enabled: false
