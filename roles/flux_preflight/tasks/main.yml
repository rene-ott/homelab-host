---
# Guard: catches an inconsistent host_vars combination when this role is run in isolation via
# --tags flux_preflight (playbooks/site.yml's own pre_tasks assert only covers a full-playbook run).
- name: Assert k3s is enabled when flux_preflight is enabled
  ansible.builtin.assert:
    that: k3s_enabled | default(true) | bool
    fail_msg: >-
      flux_preflight requires K3s — set k3s_enabled: true or disable flux_preflight_enabled/
      flux_bootstrap_enabled too.

# Guard: key must exist (generated by scripts/init-workstation.sh)
- name: Assert flux-deploy key exists on workstation
  ansible.builtin.assert:
    that: (flux_deploy_key_file | expanduser) is file
    fail_msg: |
      Flux deploy key not found: {{ flux_deploy_key_file | expanduser }}

      Generate it by running:
        ./scripts/init-workstation.sh
  delegate_to: localhost
  run_once: true
  become: false

# Duplicated (identically) in flux_bootstrap rather than shared via this role's registered var,
# so `--tags flux_bootstrap` still works standalone without depending on flux_preflight having run.
- name: Check if flux-system namespace exists
  ansible.builtin.command:
    cmd: k3s kubectl get namespace flux-system
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: flux_preflight_ns_check
  failed_when: false
  changed_when: false

- name: Verify Flux deploy key access to repository
  when: flux_preflight_ns_check.rc != 0
  block:
    - name: Check whether Flux deploy key can reach the repository # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git ls-remote {{ flux_repo_url }}
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ flux_deploy_key_file | expanduser | quote }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
      register: flux_preflight_git_check
      failed_when: false
      changed_when: false
      delegate_to: localhost
      run_once: true
      become: false

    - name: Display Flux deploy public key for GitHub registration
      ansible.builtin.debug:
        msg: |
          ============================================================
          Add this public key to the GitHub repository as a deploy key.

          Enable "Allow write access" for the first bootstrap because
          Flux needs to push the gotk-* manifests.

          Repository:
          {{ flux_repo_url }}
          ============================================================

          {{ lookup('file', (flux_deploy_key_file | expanduser) ~ '.pub') }}
      when: flux_preflight_git_check.rc != 0
      delegate_to: localhost
      run_once: true
      become: false

    - name: Wait for Flux deploy key to be registered on GitHub
      ansible.builtin.pause:
        prompt: "Press Enter once the deploy key is added to GitHub..."
      when: flux_preflight_git_check.rc != 0
      run_once: true

    - name: Verify Flux deploy key can reach the repository # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: git ls-remote {{ flux_repo_url }}
      environment:
        GIT_SSH_COMMAND: "ssh -i {{ flux_deploy_key_file | expanduser | quote }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
      changed_when: false
      delegate_to: localhost
      run_once: true
      become: false
